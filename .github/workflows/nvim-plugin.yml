name: Neovim plugin

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  lint:
    name: Check Python LSP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Compile LSP server
        run: python -m py_compile nvim/e16.nvim/server/e16_lsp.py
